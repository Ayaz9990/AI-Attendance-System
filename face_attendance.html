<!DOCTYPE html>
<html>

<head>

<title>Face Attendance Scanner</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

video{
margin-top:20px;
border:3px solid cyan;
border-radius:10px;
}

</style>

</head>

<body>

<h2>Face Attendance Scanner</h2>

<video id="video" width="450" height="350" autoplay muted></video>

<p id="status">Loading AI models...</p>

<!-- FACE API (WORKING CDN) -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script>

window.onload = async function(){

const video = document.getElementById("video")
const statusText = document.getElementById("status")

const API="http://127.0.0.1:5000"

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject = stream

}catch(err){

statusText.innerText="Camera access denied"

}

}

async function loadModels(){

try{

const MODEL_URL="./models"

await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)

await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)

await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)

statusText.innerText="AI Ready"

}catch(err){

console.error(err)

statusText.innerText="Model loading failed"

}

}

async function scanFace(){

try{

const detection = await faceapi
.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
.withFaceLandmarks()
.withFaceDescriptor()

if(!detection){

statusText.innerText="No face detected"

return

}

const encoding = JSON.stringify(Array.from(detection.descriptor))

statusText.innerText="Matching face..."

const res = await fetch(API+"/match-face",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
encoding:encoding
})

})

const data = await res.json()

if(data.success){

statusText.innerText="Attendance marked for "+data.name

}else{

statusText.innerText="Face not recognized"

}

}catch(err){

console.error(err)

}

}

await loadModels()

await startCamera()

setInterval(scanFace,4000)

}

</script>

</body>

</html>
