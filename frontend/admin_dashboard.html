<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
padding:20px;
background:#020617;
}

button{
padding:10px 20px;
border:none;
cursor:pointer;
}

.nav{
padding:20px;
}

.nav button{
margin-right:10px;
background:#06b6d4;
}

.container{
padding:30px;
}

.user{
background:#1e293b;
padding:15px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:5px;
}

.approve{
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<div class="header">

<h2>Admin Dashboard</h2>

<button onclick="logout()" style="background:red;color:white;">Logout</button>

</div>

<div class="nav">

<button onclick="loadPending()">Pending Users</button>
<button onclick="loadAssign()">Assign Subjects</button>

</div>

<div class="container" id="content"></div>

<script>

const API="http://127.0.0.1:5000";

function logout(){
localStorage.clear();
window.location="login.html";
}

async function loadPending(){

const res = await fetch(API+"/pending-users");
const users = await res.json();

let html="<h3>Pending Users</h3>";

users.forEach(u=>{

html+=`
<div class="user">

<div>
<b>${u.name}</b> (${u.role})<br>
${u.email}
</div>

<button class="approve"
onclick="approve(${u.id})">
Approve
</button>

</div>
`;

});

document.getElementById("content").innerHTML=html;

}

async function approve(id){

await fetch(API+"/approve-user/"+id,{
method:"POST"
});

loadPending();

}

function loadAssign(){

document.getElementById("content").innerHTML=
`<iframe src="admin_assign_subject.html"
width="100%" height="600"
style="border:none"></iframe>`;

}

loadPending();

</script>

</body>
</html>
