<!DOCTYPE html>
<html>

<head>

<title>Teacher Dashboard</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.container{
width:350px;
margin:auto;
margin-top:150px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#06b6d4;
border:none;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Teacher Dashboard</h2>

<label>Select Subject</label>

<select id="subject"></select>
<button onclick="startAttendance()">Start Attendance</button>
<button onclick="openScanner()">Open Face Scanner</button>


<p id="status"></p>

</div>

<script>

const API="http://127.0.0.1:5000";

const teacher_id = localStorage.getItem("user_id");

async function loadSubjects(){

const res = await fetch(API+"/teacher-subjects/"+teacher_id);

const subjects = await res.json();

const select = document.getElementById("subject");

select.innerHTML="";

subjects.forEach(s=>{

const opt=document.createElement("option");

opt.value=s.id;

opt.text=`${s.name} (${s.year} SEM ${s.semester})`;

select.appendChild(opt);

});

}

async function startAttendance(){

const subject_id=document.getElementById("subject").value;

const res=await fetch(API+"/start-session",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
teacher_id:teacher_id,
subject_id:subject_id,
year:"FE",
semester:1,
department:"Computer"
})

});

const data=await res.json();

document.getElementById("status").innerText=data.message;

}

loadSubjects();

function openScanner(){

window.location="face_attendance.html"

}
</script>

</body>

</html>
