<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
}

.header button{
padding:8px 15px;
background:red;
border:none;
color:white;
cursor:pointer;
}

.nav{
display:flex;
gap:10px;
padding:15px;
background:#020617;
}

.nav button{
padding:10px 20px;
background:#00c6ff;
border:none;
cursor:pointer;
font-weight:bold;
}

.container{
padding:20px;
}

.user-card{
background:#1e293b;
padding:15px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.approve{
background:#22c55e;
border:none;
padding:8px 15px;
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

iframe{
width:100%;
height:600px;
border:none;
}

</style>

</head>

<body>

<div class="header">
<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="nav">

<button onclick="showPending()">Pending Users</button>

<button onclick="showAssign()">Assign Subjects</button>

</div>

<div class="container">

<div id="pendingSection"></div>

<div id="assignSection" class="hidden">

<iframe src="admin_assign_subject.html"></iframe>

</div>

</div>

<script>

const API="http://127.0.0.1:5000";

function logout()
{
localStorage.clear();
window.location="login.html";
}

function showAssign()
{
document.getElementById("pendingSection").classList.add("hidden");
document.getElementById("assignSection").classList.remove("hidden");
}

function showPending()
{
document.getElementById("assignSection").classList.add("hidden");
document.getElementById("pendingSection").classList.remove("hidden");
loadPending();
}

async function loadPending()
{

const res=await fetch(API+"/pending-users");

const users=await res.json();

const container=document.getElementById("pendingSection");

container.innerHTML="<h3>Pending Users</h3>";

if(users.length==0)
{
container.innerHTML+="<p>No pending users</p>";
return;
}

users.forEach(user=>{

container.innerHTML+=`

<div class="user-card">

<div>

<b>${user.name}</b> (${user.role})<br>

${user.email}

</div>

<button class="approve" onclick="approveUser(${user.id})">

Approve

</button>

</div>

`;

});

}

async function approveUser(id)
{

const res=await fetch(API+"/approve-user/"+id,
{
method:"POST"
});

const data=await res.json();

loadPending();

}

showPending();

</script>

</body>
</html>
