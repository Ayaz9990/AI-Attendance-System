<!DOCTYPE html>
<html>
<head>

<title>Student Dashboard</title>

<style>

body
{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header
{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container
{
padding:30px;
}

.card
{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button
{
background:#00c6ff;
border:none;
padding:10px 20px;
color:black;
font-weight:bold;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

button:hover
{
background:#00a2cc;
}

.logout
{
background:red;
color:white;
}

table
{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td
{
padding:10px;
border-bottom:1px solid gray;
text-align:left;
}

.status
{
margin-top:10px;
color:#00ffcc;
}

</style>

</head>

<body>

<div class="header">

<h2>Student Dashboard</h2>

<div>

<span id="studentName"></span>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>


<div class="container">

<div class="card">

<h3>Profile</h3>

<p><b>Name:</b> <span id="name"></span></p>

<p><b>Email:</b> <span id="email"></span></p>

</div>


<div class="card">

<h3>Face Registration</h3>

<p>Register your face before marking attendance</p>

<button onclick="goFaceRegister()">Register Face</button>

</div>


<div class="card">

<h3>Mark Attendance</h3>

<button onclick="markAttendance()">Mark Attendance</button>

<div id="attendanceStatus" class="status"></div>

</div>


<div class="card">

<h3>Attendance History</h3>

<button onclick="loadAttendance()">Refresh</button>

<table>

<thead>

<tr>

<th>Subject</th>

<th>Date</th>

<th>Status</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

</div>


</div>


<script>

const API="http://127.0.0.1:5000";

const studentId=localStorage.getItem("user_id");
const studentName=localStorage.getItem("name");

document.getElementById("studentName").innerText=studentName;
document.getElementById("name").innerText=studentName;

async function loadProfile()
{

const res=await fetch(API+"/debug-users");

const users=await res.json();

const student=users.find(u=>u.id==studentId);

if(student)
{
document.getElementById("email").innerText=student.email;
}

}


function goFaceRegister()
{
window.location.href="./face_register.html";
}


async function markAttendance()
{

document.getElementById("attendanceStatus").innerText="Marking attendance...";

const res=await fetch(API+"/mark-attendance",
{
method:"POST",
headers:
{
"Content-Type":"application/json"
},
body:JSON.stringify(
{
student_id:studentId
})
});

const data=await res.json();

document.getElementById("attendanceStatus").innerText=data.message;

}


async function loadAttendance()
{

const res=await fetch(API+"/student-attendance/"+studentId);

const records=await res.json();

const table=document.getElementById("attendanceTable");

table.innerHTML="";

records.forEach(r=>
{

table.innerHTML+=`
<tr>
<td>${r.subject}</td>
<td>${r.date}</td>
<td>Present</td>
</tr>
`;

});

}


function logout()
{
localStorage.clear();
window.location.href="./login.html";
}


loadProfile();

</script>

</body>

</html>
