<!DOCTYPE html>
<html>

<head>

<title>Assign Subject</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.container{
width:400px;
margin:auto;
margin-top:80px;
background:#1e293b;
padding:25px;
border-radius:10px;
}

select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#06b6d4;
border:none;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Assign Subject</h2>

<label>Teacher</label>
<select id="teacher"></select>

<label>Year</label>
<select id="year" onchange="loadSubjects()">
<option value="FE">FE</option>
<option value="SE">SE</option>
<option value="TE">TE</option>
<option value="BE">BE</option>
</select>

<label>Semester</label>
<select id="semester" onchange="loadSubjects()">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
</select>

<label>Department</label>
<select id="department" onchange="loadSubjects()">
<option value="ALL">ALL</option>
<option value="Computer">Computer</option>
<option value="AIDS">AIDS</option>
<option value="Mechanical">Mechanical</option>
<option value="Civil">Civil</option>
<option value="Electrical">Electrical</option>
</select>

<label>Subject</label>
<select id="subject"></select>

<button onclick="assignSubject()">Assign Subject</button>

<p id="status"></p>

</div>

<script>

const API="http://127.0.0.1:5000";

async function loadTeachers(){

const res=await fetch(API+"/teachers");

const teachers=await res.json();

const select=document.getElementById("teacher");

select.innerHTML="";

teachers.forEach(t=>{

const opt=document.createElement("option");

opt.value=t.id;

opt.text=t.name;

select.appendChild(opt);

});

}

async function loadSubjects(){

const year=document.getElementById("year").value;

const semester=document.getElementById("semester").value;

const department=document.getElementById("department").value;

const res=await fetch(
API+`/subjects-filter?year=${year}&semester=${semester}&department=${department}`
);

const subjects=await res.json();

const select=document.getElementById("subject");

select.innerHTML="";

subjects.forEach(s=>{

const opt=document.createElement("option");

opt.value=s.id;

opt.text=s.name;

select.appendChild(opt);

});

}

async function assignSubject(){

const teacher_id=document.getElementById("teacher").value;

const subject_id=document.getElementById("subject").value;

const res=await fetch(API+"/assign-subject",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
teacher_id:teacher_id,
subject_id:subject_id
})

});

const data=await res.json();

document.getElementById("status").innerText=data.message;

}

loadTeachers();
loadSubjects();

</script>

</body>

</html>
