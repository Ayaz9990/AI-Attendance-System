<!DOCTYPE html>
<html>
<head>

<title>Register Face</title>

<style>

body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

video{
margin-top:20px;
border:3px solid cyan;
border-radius:10px;
}

button{
margin-top:20px;
padding:12px 25px;
background:cyan;
border:none;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00aacc;
}

</style>

</head>

<body>

<h2>Register Your Face</h2>

<video id="video" width="400" height="300" autoplay muted playsinline></video>

<br>

<button type="button" id="registerBtn">Register Face</button>

<p id="status">Initializing...</p>


<script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>


<script>

const video = document.getElementById("video");
const statusText = document.getElementById("status");
const registerBtn = document.getElementById("registerBtn");

const API = "http://127.0.0.1:5000";
const user_id = localStorage.getItem("user_id");

let modelsLoaded = false;
let cameraReady = false;



// START CAMERA
async function startCamera()
{
    try
    {
        statusText.innerText = "Starting camera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        video.srcObject = stream;

        await new Promise(resolve=>{
            video.onloadedmetadata = resolve;
        });

        cameraReady = true;

        statusText.innerText = "Camera ready";

    }
    catch(err)
    {
        statusText.innerText = "Camera failed";
        console.error(err);
    }
}



// LOAD MODELS
async function loadModels()
{
    try
    {
        statusText.innerText = "Loading models...";

        await faceapi.nets.tinyFaceDetector.loadFromUri("models");
        await faceapi.nets.faceLandmark68Net.loadFromUri("models");
        await faceapi.nets.faceRecognitionNet.loadFromUri("models");

        modelsLoaded = true;

        statusText.innerText = "Models loaded successfully";

    }
    catch(err)
    {
        statusText.innerText = "Model loading failed";
        console.error(err);
    }
}



// REGISTER FACE
async function registerFace()
{
    if(!modelsLoaded || !cameraReady)
    {
        statusText.innerText = "System not ready yet";
        return;
    }

    registerBtn.disabled = true;

    statusText.innerText = "Detecting face...";

    await new Promise(r=>setTimeout(r,500));

    try
    {
        const detection =
        await faceapi
        .detectSingleFace(
            video,
            new faceapi.TinyFaceDetectorOptions()
        )
        .withFaceLandmarks()
        .withFaceDescriptor();


        if(!detection)
        {
            statusText.innerText = "Face detection failed";
            registerBtn.disabled = false;
            return;
        }


        statusText.innerText = "Face detected. Saving...";


        const encoding =
        JSON.stringify(
            Array.from(detection.descriptor)
        );


        const res = await fetch(API+"/register-face",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                user_id:user_id,
                encoding:encoding
            })
        });


        const data = await res.json();

        statusText.innerText = data.message;

    }
    catch(err)
    {
        console.error(err);
        statusText.innerText = "Server error";
    }

    registerBtn.disabled = false;
}



// BUTTON CLICK FIX (NO REFRESH)
registerBtn.onclick = function(event)
{
    event.preventDefault();
    event.stopPropagation();
    registerFace();
};



// INIT
async function init()
{
    await startCamera();
    await loadModels();
}

init();

</script>


</body>
</html>
